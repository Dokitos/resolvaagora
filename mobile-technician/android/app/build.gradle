plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Carrega a configuração de assinatura de release a partir de key.properties
// (fora do controlo de versões). Se não existir, o release não é assinado.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "pt.resolvaagora.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "pt.resolvaagora.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Assina com a chave de release (upload key) quando key.properties existe.
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            // R8/minify desligado na 1.ª submissão para máxima fiabilidade com os
            // plugins nativos; pode ser ativado mais tarde como otimização de tamanho.
            minifyEnabled = false
            shrinkResources = false
        }
        debug {
            // Preview instalável AO LADO da versão da Play Store (assinatura/pacote
            // diferentes). Não afeta o build de release enviado para a loja.
            applicationIdSuffix = ".preview"
            versionNameSuffix = "-preview"
        }
    }
}

flutter {
    source = "../.."
}
