name: moura_technician
description: ResolvaAgora - App do Técnico

publish_to: none
version: 1.2.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Location & Maps
  geolocator: ^11.0.0
  url_launcher: ^6.2.5

  # Camera & Images
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  intl: ^0.19.0
  timeago: ^3.6.1
  socket_io_client: ^3.1.6
  flutter_stripe: ^11.5.0

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
